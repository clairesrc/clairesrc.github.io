---
layout: default
---
<div class="container-wide">
  <article class="post-card">
    <header class="post-header">
      <span class="post-date">{{ page.date | date: "%b %-d, %Y" }}</span>
      <h1 class="display">{{ page.title | escape }}</h1>
    </header>

    <div class="post-body">
      {{ content }}
    </div>

    <nav class="post-nav">
      {%- if page.previous -%}
      <a href="{{ page.previous.url | relative_url }}" style="text-align: left;">
        <span class="nav-label">&larr; Older</span>
        {{ page.previous.title | escape }}
      </a>
      {%- else -%}
      <span></span>
      {%- endif -%}
      <a href="{{ '/' | relative_url }}" style="text-align: right;">
        <span class="nav-label">Back to</span>
        All posts
      </a>
    </nav>
  </article>
</div>
