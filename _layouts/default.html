<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#ff6f65" />
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml" />
  <link rel="manifest" href="{{ '/manifest.json' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" as="style" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  {% feed_meta %}
  {% seo %}
</head>
<body>

  <header id="top" role="banner">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="header-link">
        <figure class="photo">
          <img src="{{ '/me.jpg' | relative_url }}" alt="Photo of Claire Raud" width="64" height="64" />
        </figure>
        <h1>Claire Raud</h1>
      </a>
      <nav class="page-nav" aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}" {% if page.layout == 'home' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About</a>
      </nav>
      <div class="social-links">
        <a href="" class="email" aria-label="Email"><i class="fa-regular fa-envelope" aria-hidden="true"></i></a>
        <a href="https://github.com/clairesrc" aria-label="GitHub" target="_blank" rel="noopener"><i class="fa-brands fa-github" aria-hidden="true"></i></a>
      </div>
    </div>
  </header>

  <main role="main">
    {{ content }}
  </main>

  <footer role="contentinfo">
    <div class="footer-inner">
      <span class="footer-copy">&copy; Claire Raud &middot; Chicago, IL</span>
      <div class="footer-links">
        <a href="https://github.com/clairesrc" target="_blank" rel="noopener">GitHub</a>
        <a href="" class="email">Email</a>
      </div>
    </div>
  </footer>

  <script>
    (function() {
      var emails = document.getElementsByClassName('email');
      for (var i = 0; i < emails.length; i++) {
        emails[i].setAttribute('href', 'mai' + 'lto:hi' + '@' + 'clair' + 'e.zone');
      }
    })();
    (function() {
      var ticking = false;
      function onScroll() {
        var scrollY = window.scrollY || window.pageYOffset;
        var body = document.body;
        if (scrollY > 60) body.classList.add('scrolled');
        else body.classList.remove('scrolled');
      }
      window.addEventListener('scroll', function() {
        if (!ticking) {
          window.requestAnimationFrame(function() { onScroll(); ticking = false; });
          ticking = true;
        }
      }, { passive: true });
      onScroll();
    })();
  </script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L3DHD6SV5C"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-L3DHD6SV5C');
  </script>
</body>
</html>
